services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eticketing-api
    ports:
      - "8080:8080"
    depends_on:
      - sqlserver
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ETicketingDb;User Id=sa;Password=YourStrong@Pass123;TrustServerCertificate=True;
    networks:
      - eticketing-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: eticketing-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Pass123
    ports:
      - "1433:1433"
    volumes:
      - sqlvolume:/var/opt/mssql
    networks:
      - eticketing-network

volumes:
  sqlvolume:

networks:
  eticketing-network: